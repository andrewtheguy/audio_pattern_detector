# 881_beep_base64: same 881 marker tone as 881_beep.apd.toml, but the Step 1
# clip is carried inline as a base64-encoded WAV instead of synthesised from
# a formula. Demonstrates the wav_base64 clip source — useful when the clip
# was recorded rather than generated and a faithful replay matters more than
# parametric tunability.
#
# The embedded WAV is mono int16 at 8 kHz, 0.153 s of a 1058.87 Hz sine; the
# loader resamples it to the detector's target sample rate if they differ.
# The loader strips whitespace from [clip].data, so the base64 may use a
# TOML triple-quoted multi-line string for readability (76-char lines here,
# matching the PEM/MIME convention).

description = "Commercial Radio 881 marker (base64-WAV variant) - ~1059 Hz, ~0.153s"

