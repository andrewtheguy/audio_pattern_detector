name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create, for example v0.0.1 or v0.0.1-alpha
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-wheel:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
          - arch: arm64
            runs-on: macos-latest

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native-helper

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          release_tag = os.environ["RELEASE_TAG"]
          normalized_tag = release_tag[1:] if release_tag.startswith("v") else release_tag
          base_tag = normalized_tag.split("-", 1)[0]

          with open(root / "native-helper" / "Cargo.toml", "rb") as f:
            cargo_version = tomllib.load(f)["package"]["version"]
          with open(root / "pyproject.toml", "rb") as f:
            pyproject_version = tomllib.load(f)["project"]["version"]

          if cargo_version != pyproject_version:
            raise SystemExit(
              f"Version mismatch: Cargo.toml={cargo_version}, pyproject.toml={pyproject_version}"
            )

          if base_tag != pyproject_version:
            raise SystemExit(
              f"Release tag {release_tag} does not match package version {pyproject_version}"
            )
          PY

      - name: Install release build dependencies
        run: python -m pip install --upgrade pip numpy maturin

      - name: Build wheel
        env:
          PYO3_PYTHON: python
        run: maturin build --release -o dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ runner.os }}-${{ matrix.arch }}-py313
          path: dist/*.whl
          if-no-files-found: error

  create-release:
    needs: build-wheel
    runs-on: ubuntu-latest

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: release-assets

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -name '*.whl' -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No wheel assets found under release-assets" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            mapfile -t existing_wheels < <(
              gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | select(.name | endswith(".whl")) | .name'
            )

            for wheel in "${existing_wheels[@]}"; do
              gh release delete-asset "$RELEASE_TAG" "$wheel" --yes
            done

            gh release upload "$RELEASE_TAG" "${assets[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --title "audio-pattern-detector ${RELEASE_TAG}" \
              --generate-notes \
              --target "${GITHUB_SHA}" \
              "${assets[@]}"
          fi

  deploy-pages:
    needs: create-release
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate PEP 503 package index
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          generate_index() {
            local repo="$1"
            local pkg="$2"
            mkdir -p "_pages/simple/${pkg}"
            {
              echo '<!DOCTYPE html><html><body>'
              gh release list --repo "$repo" --limit 100 --exclude-drafts --json tagName --jq '.[].tagName' | while read -r tag; do
                gh release view "$tag" --repo "$repo" --json assets --jq '.assets[] | select(.name | endswith(".whl")) | .name' | while read -r name; do
                  echo "<a href=\"https://github.com/${repo}/releases/download/${tag}/${name}\">${name}</a><br>"
                done
              done
              echo '</body></html>'
            } > "_pages/simple/${pkg}/index.html"
          }

          generate_index "${GH_REPO}" "audio-pattern-detector"
          generate_index "andrewtheguy/fft-correlation" "fft-correlation"

          cat > _pages/simple/index.html <<'HTML'
          <!DOCTYPE html><html><body>
          <a href="audio-pattern-detector/">audio-pattern-detector</a>
          <a href="fft-correlation/">fft-correlation</a>
          </body></html>
          HTML

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_pages'
      - id: deployment
        uses: actions/deploy-pages@v4
