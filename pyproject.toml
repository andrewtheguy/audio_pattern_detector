[project]
name = "audio-pattern-detector"
version = "0.2.18"
description = ""
authors = [{ name = "Andrew Chen", email = "hello@andrewtheguy.com" }]
requires-python = "~=3.12.0"
readme = "README.md"
dependencies = [
    "fft-correlation",
    "numpy>=1.26.4,<2",
    "native-helper",
    "pyloudnorm>=0.1.1,<0.2",
    "scipy>=1.16.3,<2",
]

[project.optional-dependencies]
debug = [
    "matplotlib>=3.9.0,<4",
]

[dependency-groups]
dev = [
    "pytest>=8.2.1,<9",
    "ruff>=0.14.6",
    "basedpyright>=1.29.0",
]

[project.scripts]
audio-pattern-detector = "audio_pattern_detector.cli:main"

[tool.pytest.ini_options]
filterwarnings = [
    "ignore::RuntimeWarning:pyloudnorm.*",
]

[tool.pyright]
#stubPath = "typings"
exclude = [".venv", "build", "dist", ".git", "tests", "native-helper"]
reportUnknownParameterType = true
reportUninitializedInstanceVariable = true
# Disable basedpyright-specific strict rules
reportMissingTypeStubs = false
reportExplicitAny = false
reportAny = false
reportUnannotatedClassAttribute = false
reportUnknownMemberType = false
reportUnknownVariableType = false
reportUnknownArgumentType = false
reportUnknownLambdaType = false
reportImplicitStringConcatenation = false
reportMissingImports = true
reportMissingModuleSource = false
reportUnusedCallResult = false
reportImplicitOverride = false

[tool.uv]
environments = [
    "platform_machine == 'x86_64'",
    "platform_machine == 'aarch64'",
]

[tool.uv.sources]
fft-correlation = [
    { url = "https://github.com/andrewtheguy/fft-correlation/releases/download/v0.0.2/fft_correlation-0.0.2-cp39-abi3-manylinux_2_34_x86_64.whl", marker = "platform_machine == 'x86_64'" },
    { url = "https://github.com/andrewtheguy/fft-correlation/releases/download/v0.0.2/fft_correlation-0.0.2-cp39-abi3-manylinux_2_34_aarch64.whl", marker = "platform_machine == 'aarch64'" },
]
native-helper = { path = "native-helper", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
